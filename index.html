<!doctype html>
<html ng-app="mf0App">
<head>
    <meta charset="UTF-8">
    <title>MF0 Tools</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="mf0.js"></script>
</head>
<body>
  <div ng-controller="TeamSetupController as teamSetup">
    <div style="display:flex; flex-direction: row;">
      <div ng-repeat="player in teamSetup.players track by player.uuid" style="margin-left: 15px; border-left: 1px; flex-direction: column; width: 150px;">
        <div>Name: <input type="text" name="name" ng-model="player.name" placeholder="Player name" ng-change="teamSetup.recalculate()"></div>
        <div>Mobile frames: <input type="number" name="mobile-frames" ng-model="player.mf" ng-change="teamSetup.recalculate()"></div>
        <div>Mobile frame systems: <input type="number" name="mobile-frame-systems" ng-model="player.systems" ng-change="teamSetup.recalculate()"></div>
        <div>Stations: <input type="number" name="Mobile stations" ng-model="player.st" ng-change="teamSetup.recalculate()"></div>
        <div>Role: {{ player.role }}</div>
        <div>Score: {{ player.score }}</div>
        <div><button ng-click="teamSetup.removePlayer(player)" style="margin-top: 10px;">Remove player</button></div>
      </div>
    </div>
    <button ng-click="teamSetup.addPlayer()" style="margin-top: 10px;">Add player</button>
  </div>
</body>
</html>
